name: Weekly Newsletter Agent

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Beehiiv?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run newsletter agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: python main.py --publish
